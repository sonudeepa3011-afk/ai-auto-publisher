name: AI News Automation

on:
  workflow_dispatch:

  schedule:
    - cron: "*/30 * * * *"

jobs:
  news:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Installation
        run: |
          python --version
          pip list
          python -c "from bs4 import BeautifulSoup; print('BeautifulSoup OK')"

      - name: Run AI Automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP1_URL: ${{ secrets.WP1_URL }}
          WP1_USERNAME: ${{ secrets.WP1_USERNAME }}
          WP1_APP_PASSWORD: ${{ secrets.WP1_APP_PASSWORD }}
        run: python main.py
